apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: transaction-analyzer-prediction
  labels:
    scenarios.ai.sap.com/id: "transaction-analyzer"
    executables.ai.sap.com/id: "transaction-analyzer-serving"
    ai.sap.com/version: "1.0.1"
  annotations:
    executables.ai.sap.com/name: "transaction-analyzer-prediction"
spec:
  template:
    apiVersion: serving.kserve.io/v1beta1
    kind: InferenceService
    metadata:
      name: transaction-analyzer-prediction
      annotations: |
        autoscaling.knative.dev/metric: concurrency
        autoscaling.knative.dev/target: "1"
        autoscaling.knative.dev/targetBurstCapacity: "0"
    spec: |
      predictor:
        containers:
          - name: kserve-container
            image: docker.io/rahulcruze786/prediction-service:v1.0
            ports:
              - containerPort: 8080
                protocol: TCP
            env:
              - name: MODEL_DIR
                value: /app/models
              - name: S3_ACCESS_KEY_ID
                value: "AKIAQAB2LD3UZJWKC65B"
              - name: S3_SECRET_ACCESS_KEY
                value: "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"
              - name: S3_DEFAULT_REGION
                value: "ap-southeast-1"
              - name: S3_BUCKET
                value: "hcp-44dcaebb-5af3-42b6-87b6-3731460a704f"
              - name: S3_ENDPOINT
                value: "s3-ap-southeast-1.amazonaws.com"
              - name: S3_PATH_PREFIX
                value: "ai/transaction-analyzer"
