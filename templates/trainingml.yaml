apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: ml-classification-training
  annotations:
    scenarios.ai.sap.com/description: "ml classification training Pipeline"
    scenarios.ai.sap.com/name: "ml-classification"
    executables.ai.sap.com/description: "ml classification model"
    executables.ai.sap.com/name: "ml-classification-training"
  labels:
    scenarios.ai.sap.com/id: "ml-classification"
    ai.sap.com/version: "1.0.0"
spec:
  entrypoint: training-pipeline
  templates:
    - name: training-pipeline
      steps:
        - - name: train
            template: train-step

    - name: train-step
      metadata:
        labels:
          ai.sap.com/resourcePlan: starter
      container:
        image: docker.io/rahulcruze786/ml_training_model:v1.6
        command: ["python"]
        args:
          - "training/trainer.py"
        env:
          - name: MODEL_OUTPUT_PATH
            value: "/tmp/models"
      outputs:
        artifacts:
          - name: model-output
            globalName: multinomialNB
            path: /tmp/models          # ← only output models here
            archive:
              none: {}
